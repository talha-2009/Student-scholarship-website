<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <!-- Title -->
  <text x="20" y="26" font-size="13" font-weight="700" fill="#111827" letter-spacing="1" opacity="0.5">OPPORTUNITYNEST — BRAND PALETTE</text>
  <!-- Swatches -->
  <!-- Deep Teal -->
  <rect x="20"  y="44" width="90" height="90" rx="10" fill="#0A5A54"/>
  <text x="65"  y="154" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">#0A5A54</text>
  <text x="65"  y="168" text-anchor="middle" font-size="10" fill="#6B7280">Deep Teal</text>
  <!-- Teal Mid -->
  <rect x="128" y="44" width="90" height="90" rx="10" fill="#0F766E"/>
  <text x="173" y="154" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">#0F766E</text>
  <text x="173" y="168" text-anchor="middle" font-size="10" fill="#6B7280">Teal</text>
  <!-- Navy Blue -->
  <rect x="236" y="44" width="90" height="90" rx="10" fill="#1E3A8A"/>
  <text x="281" y="154" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">#1E3A8A</text>
  <text x="281" y="168" text-anchor="middle" font-size="10" fill="#6B7280">Navy Blue</text>
  <!-- Gold -->
  <rect x="344" y="44" width="90" height="90" rx="10" fill="#C49020"/>
  <text x="389" y="154" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">#C49020</text>
  <text x="389" y="168" text-anchor="middle" font-size="10" fill="#6B7280">Gold</text>
  <!-- Near-Black -->
  <rect x="452" y="44" width="90" height="90" rx="10" fill="#111827"/>
  <text x="497" y="154" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">#111827</text>
  <text x="497" y="168" text-anchor="middle" font-size="10" fill="#6B7280">Near-Black</text>
  <!-- Off-White -->
  <rect x="560" y="44" width="90" height="90" rx="10" fill="#F4F8F7" stroke="#E5E7EB" stroke-width="1"/>
  <text x="605" y="154" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">#F4F8F7</text>
  <text x="605" y="168" text-anchor="middle" font-size="10" fill="#6B7280">Off-White</text>
  <!-- Typography note -->
  <text x="20" y="192" font-size="11" fill="#9CA3AF">Typography: Inter (400 Regular / 500 Medium / 800 ExtraBold)  ·  Primary font for all brand usage</text>
