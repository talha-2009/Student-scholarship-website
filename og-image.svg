<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2420"/>
      <stop offset="100%" stop-color="#0d1816"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles (background texture) -->
  <circle cx="1050" cy="120" r="280" fill="none" stroke="#0f766e" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="120" r="200" fill="none" stroke="#0f766e" stroke-width="1" opacity="0.12"/>
  <circle cx="1050" cy="120" r="120" fill="none" stroke="#0f766e" stroke-width="1" opacity="0.1"/>
  <circle cx="120" cy="540" r="180" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.1"/>

  <!-- Gradient accent bar at top -->
  <rect width="1200" height="4" fill="url(#pill)"/>

  <!-- Brand mark icon (large) -->
  <rect x="80" y="100" width="100" height="100" rx="20" fill="url(#mark)"/>
  <!-- Nest arcs inside brand mark -->
  <path d="M96 177 Q130 195 164 177" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M89 170 Q130 192 171 170" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Arrow inside brand mark -->
  <line x1="130" y1="163" x2="130" y2="135" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <path d="M115 149 L130 135 L145 149" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Site name -->
  <text x="200" y="155" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="54" font-weight="800" fill="white" letter-spacing="-1">OpportunityNest</text>
  <text x="200" y="185" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#6fb8b0" letter-spacing="1">.org</text>

  <!-- Divider line -->
  <rect x="80" y="240" width="480" height="2" fill="url(#pill)" opacity="0.4" rx="1"/>

  <!-- Tagline -->
  <text x="80" y="310" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="white">Find Scholarships, Internships</text>
  <text x="80" y="365" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="white">&amp; Global Opportunities</text>

  <!-- Sub-tagline -->
  <text x="80" y="430" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#8ab8b3">Verified listings · 40+ countries · Free to use</text>

  <!-- Decorative dots (right side) -->
  <circle cx="920" cy="220" r="8" fill="#0f766e" opacity="0.6"/>
  <circle cx="960" cy="260" r="5" fill="#2563eb" opacity="0.5"/>
  <circle cx="890" cy="300" r="6" fill="#0f766e" opacity="0.4"/>
  <circle cx="1000" cy="200" r="4" fill="#2563eb" opacity="0.6"/>
  <circle cx="950" cy="180" r="10" fill="#0f766e" opacity="0.3"/>

  <!-- Right-side large icon (decorative) -->
  <g opacity="0.08">
    <path d="M800 400 Q1000 540 1200 400" stroke="white" stroke-width="18" stroke-linecap="round" fill="none"/>
    <line x1="1000" y1="370" x2="1000" y2="220" stroke="white" stroke-width="18" stroke-linecap="round"/>
    <path d="M940 290 L1000 220 L1060 290" stroke="white" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom URL -->
  <text x="80" y="590" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#4a8f88">opportunitynest.org</text>
</svg>
