<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A1F1D"/>
  <!-- Subtle texture: large decorative arcs top-right -->
  <path d="M780 -60 Q1060 200 1260 60"   stroke="#0A5A54" stroke-width="120" fill="none" opacity="0.18"/>
  <path d="M820 -40 Q1060 180 1240 80"   stroke="#0A5A54" stroke-width="60"  fill="none" opacity="0.12"/>
  <!-- Bottom-left accent arc -->
  <path d="M-60 600 Q200 460 420 620"    stroke="#1E3A8A" stroke-width="80"  fill="none" opacity="0.14"/>
  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="6" height="630" fill="#C49020"/>
  <!-- Large icon mark (centred left block) -->
  <g transform="translate(80, 170) scale(5.2)">
    <path d="M4 33 Q24 46 44 33"    stroke="white" stroke-width="3.6" stroke-linecap="round" fill="none" opacity="0.85"/>
    <path d="M8.5 26.5 Q24 38 39.5 26.5" stroke="white" stroke-width="2.8" stroke-linecap="round" fill="none" opacity="0.65"/>
    <path d="M13.5 21 Q24 31 34.5 21" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.45"/>
    <circle cx="24" cy="13" r="5.5" fill="#C49020"/>
    <circle cx="22.2" cy="11.4" r="1.8" fill="rgba(255,255,255,0.3)"/>
  </g>
  <!-- Site name -->
  <text x="370" y="230"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="76" font-weight="400" fill="white" opacity="0.92" letter-spacing="-1.5">Opportunity</text>
  <text x="370" y="316"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="76" font-weight="800" fill="#C49020" letter-spacing="-2">Nest</text>
  <!-- Divider -->
  <rect x="370" y="338" width="520" height="2" rx="1" fill="#0A5A54" opacity="0.5"/>
  <!-- Tagline -->
  <text x="370" y="390"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="28" font-weight="400" fill="rgba(255,255,255,0.65)" letter-spacing="0.2">
    Scholarships · Internships · Fellowships
  </text>
  <!-- Sub-tagline -->
  <text x="370" y="438"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="24" font-weight="400" fill="rgba(255,255,255,0.45)">
    Global opportunities for students &amp; young professionals
  </text>
  <!-- URL pill -->
  <rect x="370" y="490" width="270" height="44" rx="22" fill="#0A5A54" opacity="0.6"/>
  <text x="505" y="518" text-anchor="middle"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="20" font-weight="600" fill="rgba(255,255,255,0.9)">opportunitynest.org</text>
</svg>
